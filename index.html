<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Uniform Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1e40af, #1e3a8a); padding: 16px 20px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .header h1 { font-size: 20px; font-weight: 800; }
  .header p  { font-size: 12px; opacity: 0.7; margin-top: 3px; }
  .stats { display: flex; gap: 8px; padding: 14px; }
  .stat { flex: 1; background: #1e293b; border-radius: 14px; padding: 14px 8px; text-align: center; border: 1px solid #334155; }
  .stat .num { font-size: 30px; font-weight: 900; line-height: 1; }
  .stat .lbl { font-size: 10px; opacity: 0.5; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .blue .num  { color: #60a5fa; }
  .green .num { color: #4ade80; }
  .amber .num { color: #fbbf24; }

  .scanner-wrap { margin: 0 14px; border-radius: 20px; overflow: hidden; position: relative; background: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  #preview { width: 100%; display: block; max-height: 72vw; object-fit: cover; }
  .scan-overlay { position: absolute; inset: 0; pointer-events: none; }
  .corner { position: absolute; width: 40px; height: 40px; border-color: #4ade80; border-style: solid; }
  .tl { top: 12px; left: 12px;   border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
  .tr { top: 12px; right: 12px;  border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
  .bl { bottom: 12px; left: 12px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
  .br { bottom: 12px; right: 12px; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

  /* Target zone — highlights bottom area where barcode is */
  .target-zone {
    position: absolute;
    left: 8%; right: 8%;
    bottom: 15%; height: 22%;
    border: 2px solid #4ade80;
    border-radius: 8px;
    background: rgba(74,222,128,0.08);
  }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #4ade80, transparent);
    box-shadow: 0 0 10px #4ade80, 0 0 20px #4ade8066;
    animation: scanMove 1.5s ease-in-out infinite;
  }
  @keyframes scanMove { 0%,100% { top: 5%; } 50% { top: 90%; } }
  .zone-label {
    position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: #4ade80; white-space: nowrap; font-weight: 700;
  }

  .status-pill { margin: 10px 14px 0; background: #1e293b; border-radius: 50px; padding: 10px 20px; text-align: center; font-size: 14px; color: #64748b; border: 1px solid #334155; transition: all 0.3s; }
  .status-pill.scanning { color: #4ade80; border-color: #4ade8044; background: #14532d22; }
  .status-pill.error    { color: #f87171; border-color: #f8717144; background: #7f1d1d22; }

  .btn-row { display: flex; gap: 8px; padding: 10px 14px 0; }
  .btn { flex: 1; padding: 14px 8px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
  .btn:active { transform: scale(0.96); }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-red   { background: #dc2626; color: #fff; }
  .btn-blue  { background: #1e40af; color: #fff; }
  .btn-full  { width: calc(100% - 28px); margin: 8px 14px 0; display: block; padding: 15px; }

  .result-card { margin: 12px 14px 0; padding: 18px; border-radius: 16px; text-align: center; font-size: 17px; font-weight: 700; display: none; line-height: 1.7; }
  .result-card.success  { background: #14532d; color: #4ade80; display: block; border: 1px solid #16a34a55; }
  .result-card.already  { background: #713f12; color: #fbbf24; display: block; border: 1px solid #d9770655; }
  .result-card.notfound { background: #7f1d1d; color: #f87171; display: block; border: 1px solid #dc262655; }
  .result-card.loading  { background: #1e293b;  color: #94a3b8; display: block; }

  .divider { text-align: center; color: #334155; font-size: 11px; margin: 16px 14px 10px; font-weight: 700; letter-spacing: 2px; }

  .manual-wrap { padding: 0 14px; }
  .manual-input { width: 100%; padding: 18px; border-radius: 14px; background: #1e293b; border: 2px solid #334155; color: #e2e8f0; font-size: 22px; text-align: center; letter-spacing: 3px; margin-bottom: 10px; transition: border-color 0.2s; }
  .manual-input:focus { outline: none; border-color: #3b82f6; }

  .history { padding: 0 14px; margin-top: 20px; padding-bottom: 40px; }
  .hist-title { font-size: 11px; color: #475569; margin-bottom: 10px; font-weight: 700; letter-spacing: 2px; }
  .hist-item { background: #1e293b; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
  .hist-adm  { font-size: 16px; font-weight: 800; }
  .hist-meta { font-size: 11px; color: #64748b; margin-top: 3px; }
  .badge { font-size: 11px; padding: 5px 12px; border-radius: 50px; font-weight: 800; white-space: nowrap; }
  .b-ok  { background: #14532d; color: #4ade80; }
  .b-dup { background: #713f12; color: #fbbf24; }
  .b-err { background: #7f1d1d; color: #f87171; }

  /* Torch button */
  #torch-btn { display: none; }
  #torch-btn.visible { display: flex; }
</style>
</head>
<body>

<div class="header">
  <h1>🎽 Uniform Distribution</h1>
  <p>Sairam Vidyalaya · Live Scanner</p>
</div>

<div class="stats">
  <div class="stat blue"><div class="num" id="s-total">-</div><div class="lbl">Total</div></div>
  <div class="stat green"><div class="num" id="s-dist">-</div><div class="lbl">Done</div></div>
  <div class="stat amber"><div class="num" id="s-pend">-</div><div class="lbl">Pending</div></div>
</div>

<div style="padding: 14px 14px 0;">
  <div class="scanner-wrap" id="scanner-wrap">
    <video id="preview" autoplay muted playsinline></video>
    <div class="scan-overlay" id="overlay" style="display:none">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="target-zone">
        <div class="scan-line"></div>
        <div class="zone-label">📷 AIM BARCODE HERE</div>
      </div>
    </div>
  </div>
</div>

<div class="status-pill" id="status-pill">Tap Start Camera to begin</div>

<div class="btn-row">
  <button class="btn btn-green" id="start-btn" onclick="startCamera()">▶ Start Camera</button>
  <button class="btn btn-red"   id="stop-btn"  onclick="stopCamera()" style="display:none">⏹ Stop</button>
  <button class="btn btn-blue"  id="torch-btn" onclick="toggleTorch()">🔦</button>
</div>

<div class="result-card" id="scan-result"></div>

<div class="divider">— MANUAL ENTRY —</div>

<div class="manual-wrap">
  <input class="manual-input" type="text" id="manual-input"
         placeholder="Admission No" autocomplete="off"
         onkeydown="if(event.key==='Enter') submitManual()">
  <button class="btn btn-green btn-full" onclick="submitManual()">✅ Mark Distributed</button>
  <div class="result-card" id="manual-result" style="margin: 10px 0 0;"></div>
</div>

<div class="history">
  <div class="hist-title">SESSION HISTORY</div>
  <div id="hist-list"><div style="color:#334155;text-align:center;padding:16px;font-size:13px">No scans yet</div></div>
</div>

<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_AsaqDMRZXE-LXSUsQpmJPzwgn-pbx0zeLLE80EaLF81pE0O5nZ10zJ2SRmfPXAvjzg/exec';

const hints = new Map();
// Enable ALL barcode formats — important for ID card barcodes
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
  ZXing.BarcodeFormat.CODE_128,
  ZXing.BarcodeFormat.CODE_39,
  ZXing.BarcodeFormat.EAN_13,
  ZXing.BarcodeFormat.EAN_8,
  ZXing.BarcodeFormat.ITF,
  ZXing.BarcodeFormat.PDF_417,
  ZXing.BarcodeFormat.QR_CODE,
  ZXing.BarcodeFormat.DATA_MATRIX,
  ZXing.BarcodeFormat.CODABAR,
  ZXing.BarcodeFormat.UPC_A,
  ZXing.BarcodeFormat.UPC_E,
]);
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

const codeReader = new ZXing.BrowserMultiFormatReader(hints, 300); // scan every 300ms

let streaming  = false;
let cooldown   = false;
let torchOn    = false;
let videoTrack = null;
const history  = [];

async function startCamera() {
  const pill = document.getElementById('status-pill');
  pill.textContent = '⏳ Starting camera...';
  pill.className = 'status-pill';

  try {
    // Get back camera with highest resolution for better barcode reading
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: { ideal: 'continuous' }  // auto-focus
      }
    });

    const video = document.getElementById('preview');
    video.srcObject = stream;
    videoTrack = stream.getVideoTracks()[0];

    // Show torch button if supported
    const caps = videoTrack.getCapabilities?.() || {};
    if (caps.torch) {
      document.getElementById('torch-btn').classList.add('visible');
    }

    await video.play();

    // Now start decoding
    codeReader.decodeFromStream(stream, 'preview', (result, err) => {
      if (result && !cooldown) {
        cooldown = true;
        const code = result.getText();
        if (navigator.vibrate) navigator.vibrate(80);
        pill.textContent = '✅ Got: ' + code;
        pill.className = 'status-pill scanning';
        processAdmission(code, 'scan-result');
        setTimeout(() => {
          cooldown = false;
          pill.textContent = '🔍 Ready — aim at next barcode';
          pill.className = 'status-pill scanning';
        }, 3000);
      }
    });

    streaming = true;
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display  = 'block';
    pill.textContent = '🔍 Aim barcode at the GREEN BOX';
    pill.className = 'status-pill scanning';

  } catch(e) {
    pill.textContent = '❌ ' + (e.name === 'NotAllowedError' ? 'Allow camera permission first!' : 'Camera error: ' + e.message);
    pill.className = 'status-pill error';
  }
}

function stopCamera() {
  codeReader.reset();
  if (videoTrack) { videoTrack.stop(); videoTrack = null; }
  streaming = false;
  torchOn = false;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display  = 'none';
  document.getElementById('torch-btn').classList.remove('visible');
  const pill = document.getElementById('status-pill');
  pill.textContent = 'Tap Start Camera to begin';
  pill.className = 'status-pill';
}

async function toggleTorch() {
  if (!videoTrack) return;
  torchOn = !torchOn;
  await videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
  document.getElementById('torch-btn').textContent = torchOn ? '💡' : '🔦';
}

function submitManual() {
  const inp = document.getElementById('manual-input');
  const val = inp.value.trim().toUpperCase();
  if (!val) { inp.style.borderColor='#dc2626'; setTimeout(()=>inp.style.borderColor='#334155',1000); return; }
  processAdmission(val, 'manual-result');
  inp.value = '';
}

function processAdmission(admNo, resultId) {
  const el = document.getElementById(resultId);
  el.className = 'result-card loading';
  el.textContent = '⏳ Updating sheet...';

  const url = `${APPS_SCRIPT_URL}?action=mark&admNo=${encodeURIComponent(admNo)}`;
  fetch(url)
    .then(r => r.json())
    .then(data => showResult(data, admNo, resultId))
    .catch(() => {
      el.className = 'result-card notfound';
      el.textContent = '❌ Network error. Check internet.';
      addHistory(admNo, '', 'err');
    });
}

function showResult(r, admNo, resultId) {
  const el = document.getElementById(resultId);
  if (r.status === 'success') {
    el.className = 'result-card success';
    el.innerHTML = `✅ <b>${r.name || admNo}</b><br><small>${r.sheet || ''}</small><br>Uniform Distributed! 🎽`;
    addHistory(admNo, r.name, 'ok');
    loadStats();
    if (navigator.vibrate) navigator.vibrate([80,40,80]);
  } else if (r.status === 'already') {
    el.className = 'result-card already';
    el.innerHTML = `⚠️ <b>${r.name || admNo}</b><br>Already collected before!`;
    addHistory(admNo, r.name, 'dup');
    if (navigator.vibrate) navigator.vibrate(400);
  } else {
    el.className = 'result-card notfound';
    el.innerHTML = `❌ <b>${admNo}</b> not found in sheet!`;
    addHistory(admNo, '', 'err');
    if (navigator.vibrate) navigator.vibrate([200,100,200]);
  }
  setTimeout(() => { el.style.display='none'; el.className='result-card'; }, 5000);
}

function addHistory(admNo, name, type) {
  history.unshift({ admNo, name: name||'', type, time: new Date().toLocaleTimeString('en-IN') });
  const map = { ok:['b-ok','✅ Done'], dup:['b-dup','⚠️ Dup'], err:['b-err','❌ Err'] };
  document.getElementById('hist-list').innerHTML = history.slice(0,20).map(h => {
    const [cls,lbl] = map[h.type];
    return `<div class="hist-item">
      <div>
        <div class="hist-adm">${h.admNo}</div>
        <div class="hist-meta">${h.name ? h.name+' · ':''} ${h.time}</div>
      </div>
      <span class="badge ${cls}">${lbl}</span>
    </div>`;
  }).join('');
}

function loadStats() {
  fetch(`${APPS_SCRIPT_URL}?action=stats`)
    .then(r => r.json())
    .then(s => {
      document.getElementById('s-total').textContent = s.total;
      document.getElementById('s-dist').textContent  = s.distributed;
      document.getElementById('s-pend').textContent  = s.pending;
    }).catch(()=>{});
}

loadStats();
</script>
</body>
</html>
